<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Registration</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container form-container">

    <h1>Employee Registration</h1>

    <form action="register">

        <div class="form-group">
            <label>Employee ID</label>
            <input type="text" name="empid" placeholder="Enter Employee ID" required>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter Employee Name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter Email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" placeholder="Enter Age" required>
        </div>

        <div class="form-group">

            <label>Gender</label>

            <div class="radio-group">

                <label>
                    <input type="radio" name="gender" value="male" required>
                    Male
                </label>

                <label>
                    <input type="radio" name="gender" value="female">
                    Female
                </label>

            </div>

        </div>

        <div class="form-group">
            <label>Salary</label>
            <input type="text" name="salary" placeholder="Enter Salary" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" name="department" placeholder="Enter Department" required>
        </div>

        <button class="btn btn-primary full-width" type="submit">
            Register Employee
        </button>

    </form>

</div>

</body>
</html>
